<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telehack Input</title>
  <style>
    body {
      background: #000;
      color: #00ff00;
      font-family: monospace;
      font-size: 18px;
      padding: 20px;
      margin: 0;
    }
    #log {
      height: calc(100vh - 100px);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 10px;
      border-bottom: 1px solid #00ff00;
      padding-bottom: 10px;
    }
    #inputRow {
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      background: #000;
      color: #00ff00;
      border: 1px solid #00ff00;
      font-family: monospace;
      font-size: 18px;
      padding: 6px;
      outline: none;
    }
    button {
      background: #00ff00;
      color: #000;
      border: none;
      font-family: monospace;
      font-size: 18px;
      padding: 6px 14px;
      cursor: pointer;
    }
    #status {
      color: #ff0;
      margin-bottom: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="log"></div>
  <div id="inputRow">
    <input id="cmd" type="text" placeholder="type command here" autofocus />
    <button onclick="sendCmd()">Send</button>
    <button onclick="if(ws.readyState===WebSocket.OPEN) ws.send(' ')">Space</button>
    <button onclick="if(ws.readyState===WebSocket.OPEN) ws.send('\x03')">Ctrl+C</button>
  </div>

  <script>
    const log = document.getElementById('log')
    const status = document.getElementById('status')
    const cmd = document.getElementById('cmd')

    const ws = new WebSocket('ws://localhost:8080')

    ws.onopen = () => { status.textContent = 'Connected to Telehack' }
    ws.onclose = () => { status.textContent = 'Disconnected' }
    ws.onerror = () => { status.textContent = 'Connection error' }

    ws.onmessage = (event) => {
      log.textContent += event.data
      log.scrollTop = log.scrollHeight
    }

    function sendCmd() {
      const text = cmd.value
      if (text && ws.readyState === WebSocket.OPEN) {
        ws.send(text)
        cmd.value = ''
        ws.send('\x00PREVIEW:')
      }
    }

    cmd.addEventListener('input', () => {
      if (ws.readyState === WebSocket.OPEN) ws.send('\x00PREVIEW:' + cmd.value)
    })

    cmd.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendCmd()
      if (e.key === 'c' && e.ctrlKey) {
        e.preventDefault()
        if (ws.readyState === WebSocket.OPEN) ws.send('\x03')
      }
    })
  </script>
</body>
</html>
