<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Telehack Terminal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00aa2b;
      --green-glow: rgba(0, 255, 65, 0.15);
      --bg: #0a0a0a;
      --bg-panel: #0d0d0d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--green-dim);
      flex-shrink: 0;
      background: var(--bg-panel);
    }
    #header-title { font-size: 13px; letter-spacing: 0.15em; text-shadow: 0 0 8px var(--green); }
    #status { font-size: 11px; letter-spacing: 0.1em; display: flex; align-items: center; gap: 6px; color: var(--green-dim); }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: background 0.3s, box-shadow 0.3s; }
    #status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
    #status-dot.error { background: #ff3333; box-shadow: 0 0 6px #ff3333; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

    #log-wrap { flex: 1; overflow: hidden; position: relative; min-height: 0; }
    #log {
      height: 100%;
      overflow-y: auto;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--green);
      text-shadow: 0 0 4px rgba(0,255,65,0.4);
      -webkit-overflow-scrolling: touch;
    }
    #log::-webkit-scrollbar { width: 3px; }
    #log::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }
    #log-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 30px;
      background: linear-gradient(to bottom, var(--bg), transparent);
      pointer-events: none;
      z-index: 1;
    }

    #input-section {
      flex-shrink: 0;
      background: var(--bg-panel);
      border-top: 1px solid var(--green-dim);
      padding: 8px 10px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    #input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      background: #111;
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      padding: 4px 8px;
    }
    #input-row:focus-within { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
    #prompt-char { color: var(--green); font-size: 16px; text-shadow: 0 0 6px var(--green); flex-shrink: 0; user-select: none; }
    #cmd {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      caret-color: var(--green);
      -webkit-appearance: none;
    }
    #cmd::placeholder { color: #1a4a1a; }
    #send-btn {
      flex-shrink: 0;
      background: var(--green); color: #000;
      border: none; border-radius: 3px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px; font-weight: bold;
      padding: 6px 12px; cursor: pointer;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #send-btn:active { opacity: 0.7; }

    #quickkeys { display: flex; gap: 5px; }
    .qkey {
      flex: 1; min-width: 0;
      background: #111; color: var(--green-dim);
      border: 1px solid #1a3a1a; border-radius: 4px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px; padding: 9px 4px;
      cursor: pointer; text-align: center;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; white-space: nowrap;
    }
    .qkey:active { border-color: var(--green); color: var(--green); }

    .corner { position: fixed; width: 14px; height: 14px; border-color: var(--green-dim); border-style: solid; opacity: 0.4; pointer-events: none; z-index: 50; }
    .corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div id="app">
    <div id="header">
      <span id="header-title">&#9632; TELEHACK TERMINAL</span>
      <span id="status">
        <span id="status-dot"></span>
        <span id="status-text">CONNECTING</span>
      </span>
    </div>

    <div id="log-wrap"><div id="log"></div></div>

    <div id="input-section">
      <div id="input-row">
        <span id="prompt-char">&#9658;</span>
        <input id="cmd" type="text" placeholder="enter command..."
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
        <button id="send-btn" onclick="sendCmd()">SEND</button>
      </div>
      <div id="quickkeys">
        <button class="qkey" onclick="sendRaw(' ')">SPACE</button>
        <button class="qkey" onclick="sendRaw('\t')">TAB</button>
        <button class="qkey" onclick="sendRaw('\x03')">^C</button>
        <button class="qkey" onclick="sendRaw('\x04')">^D</button>
        <button class="qkey" onclick="sendRaw('\x1b')">ESC</button>
        <button class="qkey" onclick="scrollLog(-1)">&#9650;</button>
        <button class="qkey" onclick="scrollLog(1)">&#9660;</button>
      </div>
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log')
    const statusDot = document.getElementById('status-dot')
    const statusText = document.getElementById('status-text')
    const cmdEl = document.getElementById('cmd')

    function setStatus(state, label) {
      statusDot.className = state
      statusText.textContent = label
    }

    function stripAnsi(str) {
      return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
                .replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\x00/g, '')
    }

    function appendLog(text) {
      const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40
      logEl.textContent += stripAnsi(text)
      if (atBottom) logEl.scrollTop = logEl.scrollHeight
    }

    function scrollLog(dir) {
      logEl.scrollTop += dir * logEl.clientHeight * 0.6
    }

    const WS_URL = 'wss://telehack-g2-production.up.railway.app'
    let ws

    function connect() {
      setStatus('', 'CONNECTING')
      ws = new WebSocket(WS_URL)
      ws.onopen = () => {
        setStatus('connected', 'ONLINE')
        setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('\x00PING') }, 1000)
      }
      ws.onclose = () => { setStatus('error', 'OFFLINE'); setTimeout(connect, 3000) }
      ws.onerror = () => { setStatus('error', 'ERROR') }
      ws.onmessage = (event) => {
        const data = event.data
        if (data === '\x00PING') return
        if (data.startsWith('\x00PREVIEW:')) return
        if (data.startsWith('\x00RELAY:')) return
        if (data === '\x00VOICE:') { startVoice(); return }
        appendLog(data)
      }
    }

    function sendRaw(text) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(text)
    }

    function sendCmd() {
      const text = cmdEl.value.trim()
      if (!text) return
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(text)
        ws.send('\x00PREVIEW:')
        cmdEl.value = ''
      }
    }

    cmdEl.addEventListener('input', () => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('\x00PREVIEW:' + cmdEl.value)
    })
    cmdEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); sendCmd() }
      if (e.key === 'c' && e.ctrlKey) { e.preventDefault(); sendRaw('\x03') }
    })

    function startVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition
      if (!SR) return
      const r = new SR()
      r.lang = 'en-US'
      r.interimResults = false
      r.onresult = e => {
        const text = e.results[0][0].transcript
        cmdEl.value = text
        sendCmd()
      }
      r.start()
    }

    connect()
  </script>
</body>
</html>
